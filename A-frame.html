<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #333">
      <a-assets>
        <a-asset-item id="buildings" src="Buildings.glb"></a-asset-item>
      </a-assets>

      <a-box color="red" position="0 2 -5"></a-box>

      <a-entity 
        gltf-model="#buildings" 
        position="0 1 -5" 
        scale="1000 1000 1000">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="-1 1 1"></a-entity>
      
      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
